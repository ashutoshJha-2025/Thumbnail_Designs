<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thumbnail Designs</title>
        <style>
            *{
                margin:0%;
                padding:0%;
                box-sizing: border-box;
            }
            html, body{
               font-family: Arial, Helvetica, sans-serif;
                height:100vh;
                width:100vw;
            }
            header {
              background: #222;
              color: #fff;
               padding: 20px;
               text-align: center;
            }   
            header h1{
                margin: 10px;
            }
            header p{
                color: rgb(255, 109, 109);
                margin-bottom: 10px;
            }
            footer {
              text-align: center;
              padding: 15px;
              color: #666;
            }
            main{
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            main img{
                width: 600px;
                margin: 10px;
            }
        </style>
    </head>
    <body>

        <header>
            <h1>Design Projects</h1>
            <p>A collection of my Thumbnail Designs</p>
            <marquee behavior="scroll" direction="right">© Built by Ashutosh
                Jha</marquee>
        </header>

        <main>
            <img src="./images/modern physics.jpg" alt>
            <img src="./images/units & measurement.jpg" alt>
            <img src="./images/resistance.jpg" alt>
            <img src="./images/one shot.jpg" alt>
        </main>
    </body>
</html>
